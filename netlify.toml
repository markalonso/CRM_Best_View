[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Fix any stale/incorrect asset URLs that omit the underscore.
[[redirects]]
  from = "/next/static/*"
  to = "/_next/static/:splat"
  status = 301
  force = true

# (Optional but helpful) also fix any /next/data requests if they ever happen
[[redirects]]
  from = "/next/data/*"
  to = "/_next/data/:splat"
  status = 301
  force = true

# Cache policy: never cache HTML, aggressively cache Next static assets
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
