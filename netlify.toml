[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Repair any stale/incorrect asset URLs that omit the underscore.
[[redirects]]
  from = "/next/static/*"
  to = "/_next/static/:splat"
  status = 301
  force = true

# Cache policy: HTML/pages should revalidate, immutable Next build assets can be long-lived.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
